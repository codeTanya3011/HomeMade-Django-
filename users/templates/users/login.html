{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="row">
    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-6 bg-light p-4 mb-4 mx-3 rounded custom-shadow">
                <h2 class="text-center mb-4" style="color: #402b2b;">Authorization</h2>
                <form action={% url "user:login" %} method="post">
                    {% csrf_token %}
                    {% if request.GET.next %}
                        <input type="hidden" name="next" value={{request.GET.next}}>
                    {% endif %}
                    <div class="mb-3" style="color: #402b2b;">
                        <label for="id_username" class="form-label">Username</label>
                        <input type="text" class="form-control" value="{% if form.username.value %}{{ form.username.value }}{% endif %}" 
                        name="username" id="id_username" placeholder="Enter your username" required>
                    </div>
                    <div class="mb-3" style="color: #402b2b;">
                        <label for="id_password" class="form-label" style="color: #402b2b;">Password</label>
                        <input type="password" class="form-control" name="password" id="id_password" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn dropdown-toggle fs-5 text-center mx-auto d-block w-25">Login
                        <img class="catalog_item mx-1" src="{% static "deps/icons/add-user.svg" %}"
                            alt="Catalog Icon" width="22" height="22">
                    </button>
                </form>
                <div class="mt-3 d-flex justify-content-between w-100">
                    <a href="{% url "user:registration" %}" class="custom-link">Create an account</a>
                    <a href="{% url 'user:password_reset' %}" class="custom-link">Forgot your password?</a>
                </div>
                <hr>
                {% comment %} TODO {% endcomment %}
                <div class="text-center">
                    <p style="color: #402b2b;">Or log in via:</p>
                    
                    <a href="javascript:void(0)" 
                       class="btn dropdown-toggle fs-5" 
                       onclick="createSocialNotify('Google')">
                        <img class="mx-1" src="{% static 'deps/icons/google.svg' %}" alt="Google Icon" width="28" height="28">
                        Google
                    </a>
                    
                    <a href="javascript:void(0)" 
                       class="btn dropdown-toggle fs-5" 
                       onclick="createSocialNotify('Facebook')">
                        <img class="mx-1" src="{% static 'deps/icons/facebook.svg' %}" alt="Facebook Icon" width="28" height="28">
                        Facebook
                    </a>
                </div>
                
            </div>
        </div>
    </div>
</div>
{% endblock %}
