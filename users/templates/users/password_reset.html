{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="bg-light p-4 rounded custom-shadow border-0 text-center">
                <h3 class="mb-4" style="color: #402b2b; font-weight: 600;">Password Reset</h3>
                <p class="text-muted mb-4" style="font-size: 1rem;">
                    Enter your email address below, and we'll email instructions for setting a new one.
                </p>
                
                <form method="post" id="password-reset-form">
                    {% csrf_token %}
                    <div class="form-group mb-3 text-start">
                        <label for="id_email" style="color: #402b2b; font-size: 0.9rem;">Email address</label>
                        <input type="email" name="email" id="id_email" class="form-control" required 
                               style="background-color: #f7f0ef; border: 1px solid #c3b2b2;">
                    </div>
                
                    <button type="submit" id="submit-btn" class="btn btn-reset-main w-75 mb-3" 
                            style="background-color: #a38d8d; color: white;">
                        Send reset link <i class="bi bi-send"></i>
                    </button>
                </form>
                
                <script>
                    document.getElementById('password-reset-form').onsubmit = function() {
                        const btn = document.getElementById('submit-btn');

                        if (btn.classList.contains('disabled')) {
                            return false;
                        }
          
                        btn.disabled = true;
                        btn.classList.add('disabled');
                        btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Sending...';
                        
                        return true;
                    };
                </script>
                
                <div class="mt-2">
                    <a href="{% url 'user:login' %}" class="btn-reset-back w-50">
                        <i class="bi bi-arrow-left"></i> Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
    
<script>
    const form = document.querySelector('form');
    const btn = document.querySelector('.custom-auth-btn');

    form.onsubmit = function() {
    
        btn.disabled = true;
        btn.innerHTML = 'Sending...';
    };
</script>
{% endblock %}
