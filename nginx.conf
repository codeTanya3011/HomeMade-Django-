upstream django_app {
    server web:8000;
}

server {
    listen 80;

    server_name store.tanya-dev.help www.store.tanya-dev.help;

    client_max_body_size 20M;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location / {
        proxy_pass http://django_app;
        proxy_redirect off;
    }

    location /static/ {
        alias /app/static/;
        expires 30d;
    }

    location /media/ {
        alias /app/media/;
        expires 30d;
    }

    sendfile on;
    tcp_nopush on;
}